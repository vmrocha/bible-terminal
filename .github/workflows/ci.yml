name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run checks
        run: make check

      - name: Validate release archives
        if: runner.os == 'Linux'
        run: |
          commit=$(git rev-parse HEAD)
          ./scripts/build-release.sh \
            v0.0.0-test \
            "$commit" \
            1970-01-01T00:00:00Z \
            0 \
            "$RUNNER_TEMP/release-dist"
          (
            cd "$RUNNER_TEMP/release-dist"
            sha256sum --check checksums.txt
            test "$(find . -name 'bible-terminal_*.tar.gz' | wc -l)" -eq 4
            mkdir smoke
            tar -xzf bible-terminal_0.0.0-test_linux_amd64.tar.gz -C smoke
            smoke/bible version | grep -F 'bible v0.0.0-test'
          )
