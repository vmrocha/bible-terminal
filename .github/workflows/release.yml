name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Run checks
        run: make check

      - name: Validate release notes
        run: test -f "docs/releases/$GITHUB_REF_NAME.md"

      - name: Build release archives
        run: |
          build_date=$(git show -s --format=%cI "$GITHUB_SHA")
          source_epoch=$(git show -s --format=%ct "$GITHUB_SHA")
          ./scripts/build-release.sh \
            "$GITHUB_REF_NAME" \
            "$GITHUB_SHA" \
            "$build_date" \
            "$source_epoch" \
            dist

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/bible-terminal_*.tar.gz \
            dist/checksums.txt \
            --verify-tag \
            --notes-file "docs/releases/$GITHUB_REF_NAME.md" \
            --title "Bible Terminal $GITHUB_REF_NAME"
