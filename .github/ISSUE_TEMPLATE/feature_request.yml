name: Feature request
description: Propose an improvement to Bible Terminal
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an improvement. Please explain the user need before describing a solution.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Before submitting
      options:
        - label: I searched the existing issues for a similar request.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to accomplish, and who would benefit?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the desired command, output, or workflow.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe current workarounds or other approaches you considered.

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add examples, links, or constraints that clarify the request.

  - type: checkboxes
    id: conduct
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow the [Code of Conduct](https://github.com/vmrocha/bible-terminal/blob/main/CODE_OF_CONDUCT.md).
          required: true
