name: Bug report
description: Report a reproducible problem with Bible Terminal
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Bible Terminal. Do not include secrets or personal data. For suspected security vulnerabilities, follow the [security policy](https://github.com/vmrocha/bible-terminal/security/policy) instead of opening an issue.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Before submitting
      options:
        - label: I searched the existing issues for this problem.
          required: true
        - label: I can reproduce this with the latest release or current `main` branch.
          required: true

  - type: input
    id: version
    attributes:
      label: Bible Terminal version
      description: Paste the first line from `bible version` or provide the commit hash.
      placeholder: bible v0.1.0
    validations:
      required: true

  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: input
    id: architecture
    attributes:
      label: Architecture
      placeholder: arm64 or amd64
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command
      description: Show the smallest command that demonstrates the problem.
      render: shell
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What happened? Include complete, redacted error messages.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Install...
        2. Run...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add relevant configuration, logs, or links. Redact sensitive data.

  - type: checkboxes
    id: conduct
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow the [Code of Conduct](https://github.com/vmrocha/bible-terminal/blob/main/CODE_OF_CONDUCT.md).
          required: true
